[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "neuroload"
version = "0.2.0"
description = "Real-time EEG cognitive burnout detection — COG-BCI pipeline"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }

dependencies = [
    # EEG / signal processing
    "mne>=1.6",
    "brainflow>=5.12",
    "scipy>=1.11",
    "numpy>=1.24",
    "pandas>=2.0",
    "pyarrow>=14.0",          # parquet support

    # ML
    "xgboost>=2.0",
    "scikit-learn>=1.3",
    "shap>=0.44",
    "joblib>=1.3",

    # App
    "streamlit>=1.32",
    "plotly>=5.18",
    "fpdf2>=2.7",
    "Pillow>=10.0",

    # Utilities
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "loguru>=0.7",
]

[project.optional-dependencies]
dev = ["pytest>=7", "black", "ruff", "ipykernel"]

[tool.setuptools.packages.find]
where = ["."]
include = ["neuroload*", "core*", "streaming*", "app*", "sdk*", "reports*"]

[project.scripts]
neuroload = "app.app:main"